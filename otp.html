<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AuraCraft — Verify OTP</title>
    <meta name="description" content="Verify your phone number with OTP to access AuraCraft.">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>

    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0f0f13;
            --surface: #1a1a24;
            --surface2: #22222f;
            --border: rgba(255, 255, 255, 0.08);
            --text: #f0f0f5;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b83;
            --accent: #a78bfa;
            --accent-glow: rgba(167, 139, 250, 0.25);
            --success: #34d399;
            --error: #f87171;
            --warning: #fbbf24;
            --radius: 16px;
        }

        html,
        body {
            height: 100%;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* Animated background orbs */
        .bg-orbs {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            animation: drift 12s ease-in-out infinite alternate;
        }

        .orb-1 {
            width: 400px;
            height: 400px;
            background: #7c3aed;
            top: -10%;
            left: -10%;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #0ea5e9;
            bottom: -10%;
            right: -5%;
            animation-delay: -4s;
        }

        .orb-3 {
            width: 200px;
            height: 200px;
            background: #f472b6;
            top: 50%;
            left: 50%;
            animation-delay: -8s;
        }

        @keyframes drift {
            from {
                transform: translate(0, 0) scale(1);
            }

            to {
                transform: translate(30px, 30px) scale(1.05);
            }
        }

        /* Card */
        .otp-card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px;
            width: 100%;
            max-width: 420px;
            margin: 16px;
            box-shadow: 0 32px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(167, 139, 250, 0.08);
            animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 28px;
        }

        .logo-img {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            object-fit: contain;
        }

        .logo-name {
            font-size: 1.1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a78bfa, #67e8f9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .otp-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, rgba(167, 139, 250, 0.2), rgba(103, 232, 249, 0.15));
            border: 1px solid rgba(167, 139, 250, 0.3);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 20px;
        }

        .otp-title {
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
        }

        .otp-sub {
            font-size: 0.875rem;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 32px;
            line-height: 1.5;
        }

        .otp-sub strong {
            color: var(--accent);
        }

        /* 6-digit boxes */
        .otp-boxes {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 28px;
        }

        .otp-box {
            width: 52px;
            height: 60px;
            background: var(--surface2);
            border: 1.5px solid var(--border);
            border-radius: 12px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
            caret-color: var(--accent);
        }

        .otp-box:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
            background: rgba(167, 139, 250, 0.06);
        }

        .otp-box.filled {
            border-color: rgba(167, 139, 250, 0.5);
            background: rgba(167, 139, 250, 0.08);
        }

        .otp-box.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(248, 113, 113, 0.2);
        }

        .otp-box.success {
            border-color: var(--success);
            box-shadow: 0 0 0 3px rgba(52, 211, 153, 0.2);
        }

        /* Timer */
        .timer-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .timer-count {
            color: var(--warning);
            font-weight: 600;
        }

        .resend-btn {
            background: none;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            padding: 0;
            opacity: 0.4;
            pointer-events: none;
            transition: opacity 0.3s;
        }

        .resend-btn.active {
            opacity: 1;
            pointer-events: auto;
        }

        .resend-btn.active:hover {
            text-decoration: underline;
        }

        /* Verify button */
        .btn-verify {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(124, 58, 237, 0.4);
        }

        .btn-verify:hover:not(:disabled) {
            transform: translateY(-1px);
            box-shadow: 0 8px 28px rgba(124, 58, 237, 0.5);
        }

        .btn-verify:active:not(:disabled) {
            transform: translateY(0);
        }

        .btn-verify:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-verify .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2.5px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Status message */
        .status-msg {
            margin-top: 16px;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.85rem;
            text-align: center;
            display: none;
        }

        .status-msg.error {
            display: block;
            background: rgba(248, 113, 113, 0.12);
            color: var(--error);
            border: 1px solid rgba(248, 113, 113, 0.25);
        }

        .status-msg.success {
            display: block;
            background: rgba(52, 211, 153, 0.1);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.2);
        }

        /* Back link */
        .back-link {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 24px;
            font-size: 0.83rem;
            color: var(--text-muted);
            text-decoration: none;
            justify-content: center;
            transition: color 0.2s;
        }

        .back-link:hover {
            color: var(--text);
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 0.875rem;
            font-weight: 500;
            min-width: 240px;
            max-width: 320px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: toastIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .toast.success {
            background: #065f46;
            border: 1px solid #34d399;
            color: #a7f3d0;
        }

        .toast.error {
            background: #7f1d1d;
            border: 1px solid #f87171;
            color: #fecaca;
        }

        .toast.info {
            background: #1e1b4b;
            border: 1px solid #818cf8;
            color: #c7d2fe;
        }

        @keyframes toastIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="otp-card">
        <div class="logo-row">
            <img src="images/app-logo.png" alt="AuraCraft" class="logo-img" onerror="this.style.display='none'">
            <span class="logo-name">AuraCraft</span>
        </div>

        <div class="otp-icon">📱</div>
        <h1 class="otp-title">Enter OTP</h1>
        <p class="otp-sub" id="otp-sub-text">
            We sent a 6-digit code to<br><strong id="otp-phone-display"></strong>
        </p>

        <!-- 6 OTP input boxes -->
        <div class="otp-boxes" id="otp-boxes">
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="0"
                autocomplete="one-time-code">
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="1">
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="2">
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="3">
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="4">
            <input class="otp-box" type="text" inputmode="numeric" maxlength="1" data-index="5">
        </div>

        <!-- Timer + Resend -->
        <div class="timer-row">
            <span>Code expires in <span class="timer-count" id="timer-display">2:00</span></span>
            <button class="resend-btn" id="resend-btn" onclick="resendOTP()">Resend OTP</button>
        </div>

        <!-- Verify button -->
        <button class="btn-verify" id="verify-btn" onclick="verifyOTP()" disabled>
            <i class="ph ph-shield-check"></i>&nbsp; Verify OTP
        </button>

        <div class="status-msg" id="status-msg"></div>

        <a href="index.html" class="back-link">
            <i class="ph ph-arrow-left"></i> Back to login
        </a>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <!-- Firebase Compat SDK (v9 compat — works without bundler) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>

    <!-- Invisible reCAPTCHA container (needed for resend) -->
    <div id="recaptcha-container"></div>

    <script src="js/otp.js"></script>
</body>

</html>
